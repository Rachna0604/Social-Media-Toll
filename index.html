<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Social Media Toll</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00fff7;
    --magenta: #ff00c8;
    --yellow: #ffe600;
    --dark: #050a0e;
    --panel: rgba(5,10,14,0.82);
    --glow-cyan: 0 0 8px #00fff7, 0 0 24px #00fff788;
    --glow-mag: 0 0 8px #ff00c8, 0 0 24px #ff00c888;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--dark);
    font-family: 'Share Tech Mono', monospace;
    color: var(--cyan);
  }

  /* ─── SCREENS ─── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
    transition: opacity 0.4s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ─── SPLASH ─── */
  #splash {
    background: var(--dark);
    gap: 0;
  }

  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,255,247,0.03) 3px, rgba(0,255,247,0.03) 4px
    );
    pointer-events: none; z-index: 999;
  }

  .splash-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2rem, 10vw, 3.5rem);
    font-weight: 900;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.1;
  }
  .splash-title span { color: var(--magenta); text-shadow: var(--glow-mag); }

  .splash-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(0.75rem, 3.5vw, 1rem);
    color: rgba(0,255,247,0.55);
    text-align: center;
    margin-top: 10px;
    letter-spacing: 0.2em;
  }

  .splash-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 32px 20px 0;
    width: calc(100% - 40px);
    max-width: 400px;
  }
  .task-card {
    border: 1px solid rgba(0,255,247,0.25);
    background: rgba(0,255,247,0.04);
    padding: 14px 10px;
    border-radius: 6px;
    text-align: center;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    color: rgba(0,255,247,0.7);
    transition: border-color 0.2s, background 0.2s;
  }
  .task-card .icon { font-size: 1.6rem; display: block; margin-bottom: 4px; }
  .task-card.active {
    border-color: var(--cyan);
    background: rgba(0,255,247,0.12);
    color: var(--cyan);
    box-shadow: var(--glow-cyan);
  }

  .btn-start {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem; font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--dark);
    background: var(--cyan);
    border: none; outline: none;
    padding: 16px 40px;
    border-radius: 4px;
    margin-top: 28px;
    cursor: pointer;
    box-shadow: var(--glow-cyan);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-start:active { transform: scale(0.96); box-shadow: none; }

  /* ─── EXERCISE ─── */
  #exercise { background: #000; z-index: 1; }

  #video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  #canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    transform: scaleX(-1);
  }

  .hud {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 5;
  }

  .hud-task {
    position: absolute; top: 16px; left: 0; right: 0;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(0.7rem, 3.5vw, 0.95rem);
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--cyan);
    text-shadow: var(--glow-cyan);
    padding: 6px 16px;
    text-transform: uppercase;
  }

  .hud-counter {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(5rem, 28vw, 10rem);
    font-weight: 900;
    color: var(--cyan);
    text-shadow: 0 0 20px #00fff7, 0 0 60px #00fff788, 0 0 120px #00fff733;
    opacity: 0.92;
    transition: transform 0.08s ease, color 0.08s;
    pointer-events: none;
  }
  .hud-counter.pulse {
    animation: pulse-counter 0.25s ease;
  }
  @keyframes pulse-counter {
    0% { transform: translate(-50%,-50%) scale(1); color: var(--cyan); }
    50% { transform: translate(-50%,-50%) scale(1.3); color: var(--yellow); text-shadow: 0 0 30px #ffe600, 0 0 80px #ffe60088; }
    100% { transform: translate(-50%,-50%) scale(1); color: var(--cyan); }
  }

  .hud-phase {
    position: absolute;
    bottom: 110px; left: 8px; right: 8px;
    text-align: center;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(0.82rem, 4vw, 1.05rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #ffffff;
    text-shadow:
      -2px -2px 0 #000, 2px -2px 0 #000,
      -2px  2px 0 #000, 2px  2px 0 #000,
      0 0 14px rgba(0,255,247,0.9);
    text-transform: uppercase;
    background: rgba(0,0,0,0.52);
    padding: 7px 14px;
    border-radius: 4px;
  }

  .hud-progress {
    position: absolute;
    bottom: 68px; left: 24px; right: 24px;
    height: 5px;
    background: rgba(0,255,247,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .hud-progress-fill {
    height: 100%;
    background: var(--cyan);
    box-shadow: var(--glow-cyan);
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .hud-pose-status {
    position: absolute;
    bottom: 20px; left: 8px; right: 8px;
    text-align: center;
    font-size: clamp(0.72rem, 3.2vw, 0.86rem);
    font-weight: 600;
    letter-spacing: 0.14em;
    color: #ffffff;
    text-shadow:
      -1px -1px 0 #000, 1px -1px 0 #000,
      -1px  1px 0 #000, 1px  1px 0 #000;
    text-transform: uppercase;
    background: rgba(0,0,0,0.52);
    padding: 5px 10px;
    border-radius: 4px;
  }

  /* ─── UNLOCK ─── */
  #unlock {
    background: radial-gradient(ellipse at center, #0d1f1e 0%, var(--dark) 70%);
    gap: 0;
    z-index: 20;
  }

  .unlock-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.6rem, 8vw, 2.8rem);
    font-weight: 900;
    color: var(--yellow);
    text-shadow: 0 0 12px #ffe600, 0 0 40px #ffe60088;
    text-align: center;
    letter-spacing: 0.08em;
  }
  .unlock-sub {
    font-size: 0.8rem;
    color: rgba(0,255,247,0.6);
    letter-spacing: 0.2em;
    text-align: center;
    margin-top: 8px;
    text-transform: uppercase;
  }

  .unlock-icon {
    font-size: 5rem;
    margin: 24px 0;
    animation: float 2.5s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .btn-unlock {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--dark);
    background: linear-gradient(135deg, var(--magenta), var(--cyan));
    border: none; outline: none;
    padding: 18px 48px;
    border-radius: 4px;
    margin-top: 8px;
    cursor: pointer;
    box-shadow: 0 0 20px #ff00c888, 0 0 40px #00fff744;
    animation: glow-pulse 1.8s ease-in-out infinite;
    text-decoration: none;
    display: inline-block;
  }
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 20px #ff00c888, 0 0 40px #00fff744; }
    50% { box-shadow: 0 0 40px #ff00c8cc, 0 0 80px #00fff788; }
  }
  .btn-unlock:active { transform: scale(0.96); }

  /* corner decorations */
  .corner {
    position: fixed;
    width: 32px; height: 32px;
    border-color: rgba(0,255,247,0.3);
    border-style: solid;
    pointer-events: none;
    z-index: 998;
  }
  .corner-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>

<div class="scanlines"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- SPLASH SCREEN -->
<div id="splash" class="screen">
  <div class="splash-title">SOCIAL<br><span>MEDIA</span><br>TOLL</div>
  <div class="splash-sub">// PAY WITH YOUR BODY //</div>

  <div class="splash-grid" id="taskGrid"></div>

  <button class="btn-start" id="btnStart">[ INITIALIZE ]</button>
</div>

<!-- EXERCISE SCREEN -->
<div id="exercise" class="screen hidden">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>
  <div class="hud">
    <div class="hud-task" id="hudTask">LOADING...</div>
    <div class="hud-counter" id="hudCounter">0</div>
    <div class="hud-phase" id="hudPhase">GET INTO POSITION</div>
    <div class="hud-progress"><div class="hud-progress-fill" id="progressFill"></div></div>
    <div class="hud-pose-status" id="poseStatus">AWAITING POSE DETECTION</div>
  </div>
</div>

<!-- UNLOCK SCREEN -->
<div id="unlock" class="screen hidden">
  <div class="unlock-title">ACCESS<br>GRANTED</div>
  <div class="unlock-sub">Toll paid. You earned it.</div>
  <div class="unlock-icon">🔓</div>
  <a class="btn-unlock" id="btnUnlock" href="intent://instagram.com/#Intent;package=com.instagram.android;scheme=https;end">[ OPEN INSTAGRAM ]</a>
</div>

<script>
// ═══════════════════════════════════════════════
//  AUDIO ENGINE
// ═══════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function beep(freq = 880, dur = 0.12, type = 'sine', vol = 0.4) {
  try {
    if (!audioCtx) audioCtx = new AudioCtx();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function repBeep() { beep(1046, 0.12, 'sine', 0.35); setTimeout(() => beep(1318, 0.1, 'sine', 0.25), 90); }
function completeBeep() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.18, 'triangle', 0.4), i * 120));
}

// ═══════════════════════════════════════════════
//  WAKE LOCK
// ═══════════════════════════════════════════════
let wakeLock = null;
async function acquireWakeLock() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }
}
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') await acquireWakeLock();
});

// ═══════════════════════════════════════════════
//  TASK DEFINITIONS
// ═══════════════════════════════════════════════
const TASKS = [
  { id: 'squat',   icon: '🦵', label: '10 SQUATS',        goal: 10,  unit: 'reps' },
  { id: 'jack',    icon: '⭐', label: '20 JUMPING JACKS', goal: 20,  unit: 'reps' },
  { id: 'pushup',  icon: '💪', label: '10 PUSH-UPS',      goal: 10,  unit: 'reps' },
  { id: 'plank',   icon: '🔥', label: '60s PLANK',        goal: 60,  unit: 'secs' },
];

const chosenTask = TASKS[Math.floor(Math.random() * TASKS.length)];

// ═══════════════════════════════════════════════
//  SPLASH SETUP
// ═══════════════════════════════════════════════
const taskGrid = document.getElementById('taskGrid');
TASKS.forEach(t => {
  const div = document.createElement('div');
  div.className = 'task-card' + (t.id === chosenTask.id ? ' active' : '');
  div.innerHTML = `<span class="icon">${t.icon}</span>${t.label}`;
  taskGrid.appendChild(div);
});

// ═══════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════
const splashEl    = document.getElementById('splash');
const exerciseEl  = document.getElementById('exercise');
const unlockEl    = document.getElementById('unlock');
const videoEl     = document.getElementById('video');
const canvasEl    = document.getElementById('canvas');
const ctx2d       = canvasEl.getContext('2d');
const hudTask     = document.getElementById('hudTask');
const hudCounter  = document.getElementById('hudCounter');
const hudPhase    = document.getElementById('hudPhase');
const progressFill= document.getElementById('progressFill');
const poseStatus  = document.getElementById('poseStatus');

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let repCount = 0;
let phase = 'DOWN';
let plankTimer = 0;
let plankInterval = null; // kept for compat, unused now
let plankActive = false;  // kept for compat, unused now
let completed = false;
let poseReady = false;

hudTask.textContent = `${chosenTask.icon} ${chosenTask.label}`;

function updateHUD() {
  const val = chosenTask.unit === 'secs' ? Math.floor(plankTimer) : repCount;
  const goalVal = chosenTask.goal;
  hudCounter.textContent = val;
  const pct = Math.min(100, (val / goalVal) * 100);
  progressFill.style.width = pct + '%';
}

function triggerRep() {
  repCount++;
  repBeep();
  const el = hudCounter;
  el.classList.remove('pulse');
  void el.offsetWidth;
  el.classList.add('pulse');
  updateHUD();
  if (repCount >= chosenTask.goal) triggerComplete();
}

function triggerComplete() {
  if (completed) return;
  completed = true;
  completeBeep();
  if (plankInterval) { clearInterval(plankInterval); plankInterval = null; }
  setTimeout(() => {
    exerciseEl.classList.add('hidden');
    unlockEl.classList.remove('hidden');
  }, 800);
}

// ═══════════════════════════════════════════════
//  POSE DETECTION LOGIC
// ═══════════════════════════════════════════════

// MediaPipe landmark indices
const LM = {
  NOSE: 0, L_SHOULDER: 11, R_SHOULDER: 12,
  L_ELBOW: 13, R_ELBOW: 14,
  L_WRIST: 15, R_WRIST: 16,
  L_HIP: 23, R_HIP: 24,
  L_KNEE: 25, R_KNEE: 26,
  L_ANKLE: 27, R_ANKLE: 28,
};

function mid(a, b) { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2, z: (a.z + b.z) / 2 }; }
function vis(lm, ...idxs) { return idxs.every(i => lm[i] && lm[i].visibility > 0.5); }

// ── HELPERS ──
function angle3(a, b, c) {
  // angle at point b formed by a-b-c
  const ab = { x: a.x - b.x, y: a.y - b.y };
  const cb = { x: c.x - b.x, y: c.y - b.y };
  const dot = ab.x * cb.x + ab.y * cb.y;
  const mag = Math.sqrt((ab.x**2 + ab.y**2) * (cb.x**2 + cb.y**2));
  if (mag === 0) return 180;
  return Math.acos(Math.max(-1, Math.min(1, dot / mag))) * (180 / Math.PI);
}

// ── SQUAT — knee angle approach (works at any camera angle/height) ──
let squatPhase = 'UP';
// DOWN = knee bent < 110°  UP = knee straight > 155°
function detectSquat(lm) {
  // Try both sides; accept whichever has better visibility
  const haveLeft  = vis(lm, LM.L_HIP, LM.L_KNEE, LM.L_ANKLE);
  const haveRight = vis(lm, LM.R_HIP, LM.R_KNEE, LM.R_ANKLE);

  if (!haveLeft && !haveRight) {
    poseStatus.textContent = '⚠ SHOW LEGS IN FRAME — STEP BACK';
    hudPhase.textContent = 'STEP BACK · SHOW FULL BODY';
    return;
  }

  let angles = [];
  if (haveLeft)  angles.push(angle3(lm[LM.L_HIP],  lm[LM.L_KNEE],  lm[LM.L_ANKLE]));
  if (haveRight) angles.push(angle3(lm[LM.R_HIP],  lm[LM.R_KNEE],  lm[LM.R_ANKLE]));
  const kneeAngle = angles.reduce((s, v) => s + v, 0) / angles.length;

  const isDown = kneeAngle < 110;
  const isUp   = kneeAngle > 155;

  if (squatPhase === 'UP' && isDown) {
    squatPhase = 'DOWN';
    hudPhase.textContent = '↓ GOOD — NOW STAND UP';
    poseStatus.textContent = `SQUAT DOWN ✓  KNEE ANGLE: ${Math.round(kneeAngle)}°`;
  } else if (squatPhase === 'DOWN' && isUp) {
    squatPhase = 'UP';
    hudPhase.textContent = '↑ REP COUNTED!';
    if (!completed) triggerRep();
    poseStatus.textContent = `SQUAT UP ✓  KNEE ANGLE: ${Math.round(kneeAngle)}°`;
  } else {
    const arrow = squatPhase === 'UP' ? '↓ SQUAT DOWN' : '↑ STAND UP FULLY';
    poseStatus.textContent = `${arrow}  |  KNEE: ${Math.round(kneeAngle)}°`;
  }
}

// ── JUMPING JACK ──
let jackPhase = 'CLOSED';
function detectJack(lm) {
  const haveUpper = vis(lm, LM.L_SHOULDER, LM.R_SHOULDER, LM.L_WRIST, LM.R_WRIST);
  const haveLower = vis(lm, LM.L_HIP, LM.R_HIP, LM.L_ANKLE, LM.R_ANKLE);

  if (!haveUpper) { poseStatus.textContent = '⚠ SHOW ARMS IN FRAME'; return; }

  const lShoulder = lm[LM.L_SHOULDER], rShoulder = lm[LM.R_SHOULDER];
  const lWrist = lm[LM.L_WRIST], rWrist = lm[LM.R_WRIST];

  const wristsAboveShoulder = lWrist.y < lShoulder.y - 0.02 && rWrist.y < rShoulder.y - 0.02;

  let feetWide = true; // if lower body not visible assume feet ok
  if (haveLower) {
    const hipWidth = Math.abs(lm[LM.L_HIP].x - lm[LM.R_HIP].x);
    const feetWidth = Math.abs(lm[LM.L_ANKLE].x - lm[LM.R_ANKLE].x);
    feetWide = feetWidth > hipWidth * 1.2;
  }

  const isOpen = wristsAboveShoulder && feetWide;

  if (jackPhase === 'CLOSED' && isOpen) {
    jackPhase = 'OPEN';
    hudPhase.textContent = '★ OPEN — JUMP BACK';
    poseStatus.textContent = 'JACK OPEN ✓';
  } else if (jackPhase === 'OPEN' && !isOpen) {
    jackPhase = 'CLOSED';
    hudPhase.textContent = '✓ REP! JUMP OUT AGAIN';
    if (!completed) triggerRep();
    poseStatus.textContent = 'JACK CLOSED ✓ REP COUNTED';
  } else {
    poseStatus.textContent = jackPhase === 'CLOSED' ? '↑ JUMP OUT & RAISE ARMS' : '↓ JUMP BACK & LOWER ARMS';
  }
}

// ── PUSH-UP — wrist-to-shoulder angle ──
let pushPhase = 'UP';
function detectPushup(lm) {
  const haveLeft  = vis(lm, LM.L_SHOULDER, LM.L_ELBOW, LM.L_WRIST);
  const haveRight = vis(lm, LM.R_SHOULDER, LM.R_ELBOW, LM.R_WRIST);

  if (!haveLeft && !haveRight) { poseStatus.textContent = '⚠ SHOW ARMS IN FRAME'; return; }

  let angles = [];
  if (haveLeft)  angles.push(angle3(lm[LM.L_SHOULDER], lm[LM.L_ELBOW], lm[LM.L_WRIST]));
  if (haveRight) angles.push(angle3(lm[LM.R_SHOULDER], lm[LM.R_ELBOW], lm[LM.R_WRIST]));
  const elbowAngle = angles.reduce((s, v) => s + v, 0) / angles.length;

  const isDown = elbowAngle < 95;
  const isUp   = elbowAngle > 155;

  if (pushPhase === 'UP' && isDown) {
    pushPhase = 'DOWN';
    hudPhase.textContent = '↓ GOOD — PUSH UP!';
    poseStatus.textContent = `PUSH DOWN ✓  ELBOW: ${Math.round(elbowAngle)}°`;
  } else if (pushPhase === 'DOWN' && isUp) {
    pushPhase = 'UP';
    hudPhase.textContent = '↑ REP COUNTED!';
    if (!completed) triggerRep();
    poseStatus.textContent = `PUSH UP ✓  ELBOW: ${Math.round(elbowAngle)}°`;
  } else {
    poseStatus.textContent = `ELBOW: ${Math.round(elbowAngle)}° | ${pushPhase === 'UP' ? 'GO LOW' : 'PUSH UP'}`;
  }
}

// ── PLANK — timestamp-based timer (fixes interval flicker bug) ──
let plankStartTime = null;   // epoch ms when plank hold began
let plankAccum = 0;          // seconds accumulated in previous holds
let plankWasActive = false;

function detectPlank(lm) {
  // Use one side if side-profile; fall back to both
  const haveAny = vis(lm, LM.L_SHOULDER, LM.L_HIP, LM.L_KNEE) ||
                  vis(lm, LM.R_SHOULDER, LM.R_HIP, LM.R_KNEE);

  if (!haveAny) {
    if (plankWasActive) { plankAccum += (Date.now() - plankStartTime) / 1000; plankStartTime = null; plankWasActive = false; }
    poseStatus.textContent = '⚠ SHOW FULL BODY SIDE PROFILE';
    hudPhase.textContent = 'FACE SIDEWAYS · SHOW FULL BODY';
    return;
  }

  // Pick whichever side is more visible
  let shoulder, hip, knee;
  const lVis = (lm[LM.L_SHOULDER]?.visibility||0) + (lm[LM.L_HIP]?.visibility||0) + (lm[LM.L_KNEE]?.visibility||0);
  const rVis = (lm[LM.R_SHOULDER]?.visibility||0) + (lm[LM.R_HIP]?.visibility||0) + (lm[LM.R_KNEE]?.visibility||0);
  if (lVis >= rVis) {
    shoulder = lm[LM.L_SHOULDER]; hip = lm[LM.L_HIP]; knee = lm[LM.L_KNEE];
  } else {
    shoulder = lm[LM.R_SHOULDER]; hip = lm[LM.R_HIP]; knee = lm[LM.R_KNEE];
  }

  // Body is aligned horizontally if y-values are all close (plank = flat body)
  const ySpread = Math.max(shoulder.y, hip.y, knee.y) - Math.min(shoulder.y, hip.y, knee.y);
  const tol = 0.18; // generous for front-facing camera
  const aligned = ySpread < tol;

  const now = Date.now();

  if (aligned) {
    if (!plankWasActive) {
      plankStartTime = now;
      plankWasActive = true;
      hudPhase.textContent = '🔥 PLANK ACTIVE — HOLD!';
    }
    const elapsed = plankAccum + (now - plankStartTime) / 1000;
    plankTimer = elapsed;
    updateHUD();
    const left = Math.max(0, Math.ceil(chosenTask.goal - elapsed));
    poseStatus.textContent = `PLANK HOLDING ✓  ${left}s LEFT`;
    if (elapsed >= chosenTask.goal && !completed) triggerComplete();
  } else {
    if (plankWasActive) {
      plankAccum += (now - plankStartTime) / 1000;
      plankStartTime = null;
      plankWasActive = false;
      poseStatus.textContent = `⚠ LOST PLANK — REALIGN  (${Math.floor(plankAccum)}s saved)`;
      hudPhase.textContent = 'REALIGN — KEEP BODY FLAT';
    } else {
      const spread = Math.round(ySpread * 100);
      poseStatus.textContent = `NOT FLAT ENOUGH (spread ${spread}) — STRAIGHTEN BODY`;
    }
  }
}

// ═══════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════
const CONNECTIONS = window.POSE_CONNECTIONS || [];

function drawPose(landmarks) {
  const W = canvasEl.width, H = canvasEl.height;
  ctx2d.clearRect(0, 0, W, H);
  if (!landmarks || landmarks.length === 0) return;

  // draw connections
  const connList = CONNECTIONS.length ? CONNECTIONS : [
    [11,12],[11,13],[13,15],[12,14],[14,16],
    [11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28],
    [27,29],[28,30],[29,31],[30,32]
  ];

  ctx2d.save();
  ctx2d.shadowColor = '#00fff7';
  ctx2d.shadowBlur = 8;
  ctx2d.strokeStyle = '#00fff7';
  ctx2d.lineWidth = 2.5;
  ctx2d.globalAlpha = 0.85;

  connList.forEach(([a, b]) => {
    const la = landmarks[a], lb = landmarks[b];
    if (!la || !lb) return;
    if ((la.visibility||1) < 0.3 || (lb.visibility||1) < 0.3) return;
    ctx2d.beginPath();
    ctx2d.moveTo(la.x * W, la.y * H);
    ctx2d.lineTo(lb.x * W, lb.y * H);
    ctx2d.stroke();
  });

  // draw joints
  ctx2d.globalAlpha = 1;
  ctx2d.shadowBlur = 12;
  landmarks.forEach((lm, i) => {
    if ((lm.visibility||1) < 0.3) return;
    const isKey = [11,12,13,14,23,24,25,26,15,16,27,28].includes(i);
    ctx2d.beginPath();
    ctx2d.arc(lm.x * W, lm.y * H, isKey ? 5 : 3, 0, Math.PI * 2);
    ctx2d.fillStyle = isKey ? '#ffffff' : '#00fff7';
    ctx2d.shadowColor = '#00fff7';
    ctx2d.fill();
  });
  ctx2d.restore();
}

// ═══════════════════════════════════════════════
//  MEDIAPIPE SETUP
// ═══════════════════════════════════════════════
let pose;

function initPose() {
  pose = new Pose({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });

  pose.setOptions({
    modelComplexity: 0,     // 0 = Lite, fastest on mobile
    smoothLandmarks: true,
    enableSegmentation: false,
    smoothSegmentation: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5,
  });

  pose.onResults((results) => {
    if (completed) return;

    canvasEl.width = videoEl.videoWidth || canvasEl.offsetWidth;
    canvasEl.height = videoEl.videoHeight || canvasEl.offsetHeight;

    const lm = results.poseLandmarks;
    poseReady = !!lm;

    drawPose(lm);

    if (lm) {
      switch (chosenTask.id) {
        case 'squat':  detectSquat(lm);  break;
        case 'jack':   detectJack(lm);   break;
        case 'pushup': detectPushup(lm); break;
        case 'plank':  detectPlank(lm);  break;
      }
    } else {
      poseStatus.textContent = 'NO POSE DETECTED — ADJUST POSITION';
    }
  });
}

// ═══════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    videoEl.srcObject = stream;

    await new Promise(res => { videoEl.onloadedmetadata = res; });
    await videoEl.play();
    canvasEl.width = videoEl.videoWidth;
    canvasEl.height = videoEl.videoHeight;

    const camera = new Camera(videoEl, {
      onFrame: async () => { if (pose) await pose.send({ image: videoEl }); },
      width: 640, height: 480
    });
    camera.start();

    poseStatus.textContent = 'CAMERA ACTIVE — GET INTO POSITION';
  } catch(err) {
    poseStatus.textContent = 'CAMERA ERROR: ' + err.message;
    hudPhase.textContent = 'ALLOW CAMERA ACCESS';
  }
}

// ═══════════════════════════════════════════════
//  START BUTTON
// ═══════════════════════════════════════════════
// ── BACK-BUTTON LOCK ──
// Push two history states so the back button hits our interceptor first
// instead of navigating away. Only active while challenge is in progress.
let backLockActive = false;

function activateBackLock() {
  backLockActive = true;
  history.pushState({ toll: true }, '');
  history.pushState({ toll: true }, ''); // double push = two back-presses needed
}

window.addEventListener('popstate', (e) => {
  if (!backLockActive) return;
  if (completed) { backLockActive = false; return; }
  // Re-push the state to stay on page
  history.pushState({ toll: true }, '');
  // Show warning overlay briefly
  showBackWarning();
});

function showBackWarning() {
  let warn = document.getElementById('backWarn');
  if (!warn) {
    warn = document.createElement('div');
    warn.id = 'backWarn';
    warn.style.cssText = `
      position:fixed;inset:0;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:rgba(0,0,0,0.88);
      font-family:'Orbitron',sans-serif;text-align:center;padding:24px;
    `;
    warn.innerHTML = `
      <div style="font-size:3rem;margin-bottom:16px;">🚫</div>
      <div style="color:#ff00c8;font-size:1.1rem;font-weight:700;text-shadow:0 0 12px #ff00c8;letter-spacing:0.1em;">
        NO SHORTCUTS!
      </div>
      <div style="color:#fff;font-size:0.8rem;margin-top:10px;letter-spacing:0.15em;line-height:1.6;">
        COMPLETE YOUR ${chosenTask.label}<br>TO UNLOCK INSTAGRAM
      </div>
      <button onclick="document.getElementById('backWarn').remove()" style="
        margin-top:22px;font-family:'Orbitron',sans-serif;font-size:0.85rem;
        font-weight:700;letter-spacing:0.12em;color:#050a0e;
        background:#00fff7;border:none;padding:12px 28px;border-radius:4px;
        box-shadow:0 0 12px #00fff7;cursor:pointer;
      ">[ KEEP GOING ]</button>
    `;
    document.body.appendChild(warn);
  }
  warn.style.display = 'flex';
  // Auto-hide after 2.5s if user doesn't dismiss
  setTimeout(() => { if (warn) warn.remove(); }, 2500);
}

document.getElementById('btnStart').addEventListener('click', async () => {
  // unlock audio context on user gesture
  if (!audioCtx) audioCtx = new AudioCtx();
  try { await audioCtx.resume(); } catch(e) {}

  splashEl.classList.add('hidden');
  exerciseEl.classList.remove('hidden');
  updateHUD();
  activateBackLock();

  await acquireWakeLock();
  initPose();
  await startCamera();

  // task-specific initial instructions
  const instrs = {
    squat:  '↓ SQUAT DOWN · STEP BACK FROM CAMERA',
    jack:   '★ STAND · ARMS AT SIDES · JUMP OUT',
    pushup: '↓ GET INTO PUSH-UP POSITION',
    plank:  '🔥 FACE SIDEWAYS · HOLD PLANK FLAT',
  };
  hudPhase.textContent = instrs[chosenTask.id] || 'GET INTO POSITION';
});
</script>

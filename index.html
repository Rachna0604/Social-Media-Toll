<!DOCTYPE html>
<html>
<head>
  <title>Social Media Toll</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    body { margin: 0; background: #0a0a0a; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; }
    #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; }
    video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #ui-layer { z-index: 10; position: relative; text-align: center; background: rgba(0,0,0,0.6); width: 100%; padding: 20px; border-bottom: 2px solid #00ffcc; }
    #counter { font-size: 5rem; font-weight: bold; text-shadow: 0 0 20px #00ffcc; }
    #task-name { font-size: 1.5rem; letter-spacing: 2px; }
    #unlock-btn { display: none; position: absolute; bottom: 50px; padding: 20px 40px; font-size: 1.5rem; background: #00ffcc; color: black; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 0 30px #00ffcc; }
  </style>
</head>
<body>

<div id="container">
  <video id="input_video"></video>
  <canvas id="output_canvas"></canvas>
  
  <div id="ui-layer">
    <div id="task-name">INITIALIZING AI...</div>
    <div id="counter">0 / 0</div>
  </div>

  <button id="unlock-btn" onclick="window.location.href='instagram://'">UNLOCK INSTAGRAM</button>
</div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const taskText = document.getElementById('task-name');
const counterText = document.getElementById('counter');
const unlockBtn = document.getElementById('unlock-btn');

let count = 0;
let stage = 'up';
let currentTask = {};

const TASKS = [
  { name: "SQUATS", target: 10, type: "reps" },
  { name: "JUMPING JACKS", target: 15, type: "reps" }
];

// 1. Pick a random task
function initTask() {
  currentTask = TASKS[Math.floor(Math.random() * TASKS.length)];
  count = 0;
  taskText.innerText = `PAYMENT REQUIRED: ${currentTask.name}`;
  updateUI();
}

function updateUI() {
  counterText.innerText = `${count} / ${currentTask.target}`;
  if (count >= currentTask.target) {
    unlockBtn.style.display = 'block';
    taskText.innerText = "PAYMENT VERIFIED";
  }
}

// 2. Detection Logic
function onResults(results) {
  canvasCtx.save();
  canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
  canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
  
  if (results.poseLandmarks) {
    drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00ffcc', lineWidth: 4});
    drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#ffffff', lineWidth: 2, radius: 3});

    const landmarks = results.poseLandmarks;
    const leftHip = landmarks[23];
    const leftKnee = landmarks[25];
    const leftAnkle = landmarks[27];
    const leftWrist = landmarks[15];
    const leftShoulder = landmarks[11];

    if (currentTask.name === "SQUATS") {
      // Logic: Hip goes below Knee
      if (leftHip.y > leftKnee.y + 0.05) stage = 'down';
      if (leftHip.y < leftKnee.y && stage === 'down') {
        count++;
        stage = 'up';
        updateUI();
      }
    } else if (currentTask.name === "JUMPING JACKS") {
      // Logic: Hands go above shoulders
      if (leftWrist.y < leftShoulder.y) stage = 'wide';
      if (leftWrist.y > leftShoulder.y && stage === 'wide') {
        count++;
        stage = 'closed';
        updateUI();
      }
    }
  }
  canvasCtx.restore();
}

// 3. Setup Pose & Camera
const pose = new Pose({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
pose.onResults(onResults);

const camera = new Camera(videoElement, {
  onFrame: async () => { await pose.send({image: videoElement}); },
  width: 1280, height: 720, facingMode: 'user'
});

// 4. Wake Lock (Keep screen on)
async function requestWakeLock() {
  try { await navigator.wakeLock.request('screen'); } catch (err) {}
}

initTask();
camera.start();
requestWakeLock();

</script>
</body>
</html>
